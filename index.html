    <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ------------------------------------------------------------------ */
/*  Ícones (Lucide via wrapper React)                                  */
/* ------------------------------------------------------------------ */
function Icon({ name, className = "w-5 h-5", strokeWidth = 2 }) {
    const ref = useRef(null);
    useEffect(() => {
        if (ref.current && window.lucide) {
            ref.current.innerHTML = "";
            const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons.Circle);
            svg.setAttribute("stroke-width", strokeWidth);
            svg.classList.add(...className.split(" ").filter(Boolean));
            ref.current.appendChild(svg);
        }
    }, [name, className, strokeWidth]);
    return <span ref={ref} className="inline-flex items-center justify-center" />;
}

/* ------------------------------------------------------------------ */
/*  DADOS REAIS — Módulo 1, Aula 1 (20 palavras frequentes)           */
/* ------------------------------------------------------------------ */
const REAL_WORDS = [

    { jp: "今", furigana: "いま", romaji: "ima", meaning: "agora", ex: "今、何時ですか。", exFuri: "いま、なんじですか。", exTr: "Que horas são agora?" },
    { jp: "見る", furigana: "みる", romaji: "miru", meaning: "ver / olhar", ex: "映画を見ます。", exFuri: "えいがをみます。", exTr: "Vou assistir a um filme." },
    { jp: "行く", furigana: "いく", romaji: "iku", meaning: "ir", ex: "学校に行きます。", exFuri: "がっこうにいきます。", exTr: "Vou para a escola." },
    { jp: "来る", furigana: "くる", romaji: "kuru", meaning: "vir", ex: "友達が来ます。", exFuri: "ともだちがきます。", exTr: "Um amigo vem (virá)." },
    { jp: "食べる", furigana: "たべる", romaji: "taberu", meaning: "comer", ex: "朝ご飯を食べます。", exFuri: "あさごはんをたべます。", exTr: "Eu como o café da manhã." },
    { jp: "飲む", furigana: "のむ", romaji: "nomu", meaning: "beber", ex: "水を飲みます。", exFuri: "みずをのみます。", exTr: "Eu bebo água." },
    { jp: "言う", furigana: "いう", romaji: "iu", meaning: "dizer / falar", ex: "名前を言ってください。", exFuri: "なまえをいってください。", exTr: "Por favor, diga seu nome." },
    { jp: "大きい", furigana: "おおきい", romaji: "ookii", meaning: "grande", ex: "大きい家ですね。", exFuri: "おおきいいえですね。", exTr: "É uma casa grande, não é?" },
    { jp: "小さい", furigana: "ちいさい", romaji: "chiisai", meaning: "pequeno", ex: "小さい犬がいます。", exFuri: "ちいさいいぬがいます。", exTr: "Há um cachorro pequeno." },
    { jp: "good", furigana: "いい", romaji: "ii", meaning: "bom", ex: "天気がいいです。", exFuri: "てんきがいいです。", exTr: "O tempo está bom." },
    { jp: "新しい", furigana: "あたらしい", romaji: "atarashii", meaning: "novo", ex: "新しい車を買いました。", exFuri: "あたらしいくるまをかいました。", exTr: "Comprei um carro novo." },
    { jp: "水", furigana: "みず", romaji: "mizu", meaning: "água", ex: "冷たい水をください。", exFuri: "つめたいみずをください。", exTr: "Água gelada, por favor." },
    { jp: "家", furigana: "いえ", romaji: "ie", meaning: "casa", ex: "家に帰ります。", exFuri: "いえにかえります。", exTr: "Vou voltar para casa." },
    { jp: "学校", furigana: "がっこう", romaji: "gakkou", meaning: "escola", ex: "学校は楽しいです。", exFuri: "がっこうはたのしいです。", exTr: "A escola é divertida." },
    { jp: "友達", furigana: "ともだち", romaji: "tomodachi", meaning: "amigo", ex: "友達と話します。", exFuri: "ともだちとはなします。", exTr: "Converso com um amigo." },

// pequena correção do item "good" (mantemos いい como kana de destaque)
REAL_WORDS[14] = { jp: "いい", furigana: "いい", romaji: "ii", meaning: "bom", ex: "天気がいいです。", exFuri: "てんきがいいです。", exTr: "O tempo está bom." };

/* ------------------------------------------------------------------ */
/*  DATASET REAL — palavras restantes, ordenadas por frequência.       */
/*  Carregado de words.json (gerado a partir de JMdict + corpus        */
/*  Tatoeba; significados em PT e exemplos reais com furigana).        */
/* ------------------------------------------------------------------ */
let DATASET = [];   // preenchido pelo fetch("words.json") no App

const TOTAL_MODULES = 15;
const LESSONS_PER_MODULE = 10;
const WORDS_PER_LESSON = 20;

// Retorna as 20 palavras de uma aula. Aula global 0 = REAL_WORDS (curada à mão);
// as demais vêm do DATASET (por frequência). Aula global 1 -> DATASET[0..20], etc.
function getLessonWords(moduleIdx, lessonIdx) {
    const globalLesson = moduleIdx * LESSONS_PER_MODULE + lessonIdx;
    if (globalLesson === 0) return REAL_WORDS;
    const start = (globalLesson - 1) * WORDS_PER_LESSON;
    return DATASET.slice(start, start + WORDS_PER_LESSON);
}

// O conteúdo é ordenado por frequência (não por tema): rótulo = faixa de frequência.
const MODULE_THEMES = Array.from({ length: TOTAL_MODULES }, (_, m) =>
    `${m * WORDS_PER_LESSON * LESSONS_PER_MODULE + 1}–${(m + 1) * WORDS_PER_LESSON * LESSONS_PER_MODULE} mais frequentes`);

/* ------------------------------------------------------------------ */
/*  PERSISTÊNCIA (localStorage)                                        */
/* ------------------------------------------------------------------ */
const STORAGE_KEY = "okane_jp_progress_v1";

function loadProgress() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultProgress();
        const p = JSON.parse(raw);
        return { ...defaultProgress(), ...p };
    } catch { return defaultProgress(); }
}
function defaultProgress() {
    return {
        knownWords: {},        // { "m-l-i": true }
        completedLessons: {},  // { "m-l": true }
        srs: {},               // { "m-l-i": { ef, interval, reps, lapses, due, last } } — repetição espaçada
        streak: 0,
        lastStudyDate: null,   // "YYYY-MM-DD"
        theme: null,           // null=auto, 'dark', 'light'
        showFurigana: true,
    };
}
function saveProgress(p) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
}

function todayStr() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function daysBetween(a, b) {
    const da = new Date(a + "T00:00:00"), db = new Date(b + "T00:00:00");
    return Math.round((db - da) / 86400000);
}
function addDays(dateStr, n) {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + n);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

/* ------------------------------------------------------------------ */
/*  REPETIÇÃO ESPAÇADA — algoritmo estilo SM-2 (SuperMemo/Anki)        */
/*  grade: 0 = De novo · 1 = Difícil · 2 = Bom · 3 = Fácil             */
/*  Estado por palavra (em progress.srs["m-l-i"]):                     */
/*    ef       fator de facilidade (>= 1.3)                            */
/*    interval intervalo atual em dias                                 */
/*    reps     nº de acertos seguidos                                  */
/*    lapses   nº de vezes que esqueceu                                */
/*    due      próxima data de revisão "YYYY-MM-DD"                    */
/* ------------------------------------------------------------------ */
function scheduleReview(item, grade, today) {
    let ef = (item && item.ef) || 2.5;
    let interval = (item && item.interval) || 0;
    let reps = (item && item.reps) || 0;
    let lapses = (item && item.lapses) || 0;

    if (grade === 0) {
        // Esqueceu: reinicia o ciclo e revê hoje mesmo.
        reps = 0;
        lapses += 1;
        ef = Math.max(1.3, ef - 0.2);
        interval = 0;
    } else {
        // Ajusta o fator de facilidade (qualidade: Difícil=3, Bom=4, Fácil=5).
        const q = grade === 1 ? 3 : grade === 2 ? 4 : 5;
        ef = Math.max(1.3, ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
        if (reps === 0) interval = grade === 3 ? 4 : 1;                          // 1º acerto
        else if (reps === 1) interval = grade === 1 ? 3 : grade === 3 ? 8 : 6;   // 2º acerto
        else {
            const mult = grade === 1 ? 1.2 : grade === 3 ? ef * 1.3 : ef;
            interval = Math.max(1, Math.round(interval * mult));
        }
        reps += 1;
    }
    return {
        ef: Math.round(ef * 100) / 100,
        interval,
        reps,
        lapses,
        due: addDays(today, interval),
        last: today,
    };
}

// Texto curto do próximo intervalo, para mostrar nos botões de avaliação.
function humanizeInterval(days) {
    if (days <= 0) return "hoje";
    if (days === 1) return "1 dia";
    if (days < 30) return days + " dias";
    if (days < 60) return "1 mês";
    if (days < 365) return Math.round(days / 30) + " meses";
    const y = Math.round(days / 365);
    return y + (y === 1 ? " ano" : " anos");
}

// Quantas palavras estão vencidas (due <= hoje) em todo o app.
function countDue(progress, today) {
    let n = 0;
    const srs = progress.srs || {};
    for (const key in srs) {
        if (srs[key] && srs[key].due && srs[key].due <= today) n++;
    }
    return n;
}

// Monta os cards de uma sessão.
//   mode "review" -> todas as palavras vencidas (embaralhadas)
//   mode "lesson" -> as 20 palavras da aula escolhida
function buildSessionCards(mode, moduleIdx, lessonIdx, progress, today) {
    if (mode === "review") {
        const srs = progress.srs || {};
        const due = [];
        for (const key in srs) {
            const s = srs[key];
            if (!s || !s.due || s.due > today) continue;
            const parts = key.split("-").map(Number);
            const [m, l, i] = parts;
            if (parts.length !== 3 || parts.some(n => !Number.isInteger(n))) continue;
            const word = getLessonWords(m, l)[i];
            if (!word) continue;   // dataset ainda não carregado / índice fora do alcance
            due.push({ m, l, i, key, word });
        }
        for (let k = due.length - 1; k > 0; k--) {   // embaralha (Fisher–Yates)
            const j = Math.floor(Math.random() * (k + 1));
            [due[k], due[j]] = [due[j], due[k]];
        }
        return due;
    }
    return getLessonWords(moduleIdx, lessonIdx)
        .map((word, i) => ({ m: moduleIdx, l: lessonIdx, i, key: moduleIdx + "-" + lessonIdx + "-" + i, word }))
        .filter(c => c.word);
}

/* ------------------------------------------------------------------ */
/*  ÁUDIO (Web Speech API — leitura em japonês)                        */
/* ------------------------------------------------------------------ */
function speak(text) {
    if (!("speechSynthesis" in window)) return;
    try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "ja-JP";
        u.rate = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const jp = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("ja"));
        if (jp) u.voice = jp;
        window.speechSynthesis.speak(u);
    } catch {}
}

/* ------------------------------------------------------------------ */
/*  Componente: Furigana ruby                                          */
/* ------------------------------------------------------------------ */
function Ruby({ jp, furigana, show, size = "text-7xl sm:text-8xl" }) {
    return (
        <div className={"font-jp font-semibold text-slate-900 dark:text-white leading-tight " + size}>
            {show ? (
                <ruby>{jp}<rt>{furigana}</rt></ruby>
            ) : (
                <span>{jp}</span>
            )}
        </div>
    );
}

// Renderiza a frase-exemplo. Com furigana: usa exParts (ruby por segmento, dataset)
// ou exFuri (ruby única, palavras curadas da Aula 1). Sem furigana: texto puro.
function ExampleJP({ word, showFuri }) {
    if (!showFuri) return <>{word.ex}</>;
    if (word.exParts) {
        return <>{word.exParts.map((p, i) => p[1]
            ? <ruby key={i}>{p[0]}<rt>{p[1]}</rt></ruby>
            : <span key={i}>{p[0]}</span>)}</>;
    }
    if (word.exFuri) return <ruby>{word.ex}<rt>{word.exFuri}</rt></ruby>;
    return <>{word.ex}</>;
}

function LoadingVocab() {
    return (
        <div className="animate-slideup max-w-md mx-auto text-center pt-16">
            <div className="w-12 h-12 mx-auto rounded-full border-4 border-slate-200 dark:border-slate-700 border-t-red-500 animate-spin" />
            <p className="text-slate-500 dark:text-slate-400 mt-4 font-semibold">Carregando vocabulário…</p>
        </div>
    );
}

/* ================================================================== */
/*  APP                                                                */
/* ================================================================== */
function App() {
    const [progress, setProgress] = useState(loadProgress);
    const [view, setView] = useState({ screen: "dashboard" }); // dashboard | modules | lessons | flashcards | quiz
    const [dataReady, setDataReady] = useState(() => DATASET.length > 0);

    // Tema automático: segue sempre a preferência do aparelho e atualiza ao vivo
    // (se o sistema trocar de claro p/ escuro, o app acompanha na hora).
    useEffect(() => {
        const root = document.documentElement;
        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const apply = () => root.classList.toggle("dark", mq.matches);
        apply();
        mq.addEventListener("change", apply);
        return () => mq.removeEventListener("change", apply);
    }, []);

    // pré-carrega vozes de TTS
    useEffect(() => {
        if ("speechSynthesis" in window) window.speechSynthesis.getVoices();
    }, []);

    // carrega o vocabulário real (palavras 21–3000) de words.json (uma vez)
    useEffect(() => {
        if (DATASET.length > 0) { setDataReady(true); return; }
        fetch("words.json")
            .then(r => r.json())
            .then(d => { DATASET = Array.isArray(d) ? d : []; setDataReady(true); })
            .catch(() => setDataReady(true)); // se falhar, a Aula 1 (curada) ainda funciona
    }, []);

    const update = useCallback((patch) => {
        setProgress(prev => {
            const next = typeof patch === "function" ? patch(prev) : { ...prev, ...patch };
            saveProgress(next);
            return next;
        });
    }, []);

    // marca estudo de hoje -> atualiza streak
    const registerStudy = useCallback(() => {
        update(prev => {
            const t = todayStr();
            if (prev.lastStudyDate === t) return prev;
            let streak = 1;
            if (prev.lastStudyDate) {
                const diff = daysBetween(prev.lastStudyDate, t);
                if (diff === 1) streak = prev.streak + 1;
                else if (diff === 0) streak = prev.streak;
            }
            return { ...prev, streak, lastStudyDate: t };
        });
    }, [update]);

    // estatísticas
    const stats = useMemo(() => {
        const totalWords = TOTAL_MODULES * LESSONS_PER_MODULE * WORDS_PER_LESSON;
        const knownCount = Object.keys(progress.knownWords).filter(k => progress.knownWords[k]).length;
        const completedLessonsCount = Object.keys(progress.completedLessons).filter(k => progress.completedLessons[k]).length;
        let completedModules = 0;
        for (let m = 0; m < TOTAL_MODULES; m++) {
            let all = true;
            for (let l = 0; l < LESSONS_PER_MODULE; l++) {
                if (!progress.completedLessons[m + "-" + l]) { all = false; break; }
            }
            if (all) completedModules++;
        }
        return { totalWords, knownCount, completedLessonsCount, completedModules };
    }, [progress]);

    // palavras vencidas (prontas para revisão) hoje
    const dueCount = useMemo(() => countDue(progress, todayStr()), [progress]);

    return (
        <div className="min-h-screen flex flex-col text-slate-800 dark:text-slate-100">
            <Header view={view} setView={setView} streak={progress.streak} dueCount={dueCount} />
            <main className="flex-1 w-full max-w-5xl mx-auto px-4 sm:px-6 pb-24 pt-4">
                {view.screen === "dashboard" && (
                    <Dashboard stats={stats} progress={progress} setView={setView} dueCount={dueCount} />
                )}
                {view.screen === "modules" && (
                    <ModulesList progress={progress} setView={setView} />
                )}
                {view.screen === "lessons" && (
                    <LessonsList moduleIdx={view.moduleIdx} progress={progress} setView={setView} />
                )}
                {view.screen === "flashcards" && (dataReady ? (
                    <Flashcards
                        key={view.mode === "review" ? "review" : view.moduleIdx + "-" + view.lessonIdx}
                        mode={view.mode === "review" ? "review" : "lesson"}
                        moduleIdx={view.moduleIdx}
                        lessonIdx={view.lessonIdx}
                        progress={progress}
                        update={update}
                        registerStudy={registerStudy}
                        setView={setView}
                    />
                ) : <LoadingVocab />)}
                {view.screen === "quiz" && (dataReady ? (
                    <Quiz
                        key={"quiz-" + view.moduleIdx + "-" + view.lessonIdx + "-" + (view.nonce || 0)}
                        moduleIdx={view.moduleIdx}
                        lessonIdx={view.lessonIdx}
                        progress={progress}
                        update={update}
                        registerStudy={registerStudy}
                        setView={setView}
                    />
                ) : <LoadingVocab />)}
            </main>
            <BottomNav view={view} setView={setView} dueCount={dueCount} />
        </div>
    );
}

/* ------------------------------------------------------------------ */
/*  Header                                                             */
/* ------------------------------------------------------------------ */
function Header({ view, setView, streak, dueCount }) {
    // Esconde a barra ao rolar para baixo; reaparece ao rolar para cima (ou perto do topo).
    const [hidden, setHidden] = useState(false);
    useEffect(() => {
        let lastY = window.scrollY;
        const onScroll = () => {
            const y = window.scrollY;
            if (y < 80) setHidden(false);                       // perto do topo: sempre visível
            else if (Math.abs(y - lastY) > 6) setHidden(y > lastY); // desce esconde, sobe mostra
            lastY = y;
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
    }, []);
    useEffect(() => { setHidden(false); }, [view]);   // ao trocar de tela, garante visível
    return (
        <header className={"hidden sm:block sticky top-0 z-20 backdrop-blur-md bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800 transition-transform duration-300 will-change-transform " + (hidden ? "-translate-y-full" : "translate-y-0")}>
            <div className="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">

            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">

                <StatCard icon="BookOpenCheck" value={stats.completedLessonsCount} label="Aulas concluídas" color="bg-emerald-500" />

/*  Módulos                                                            */
/* ------------------------------------------------------------------ */
function moduleStats(moduleIdx, progress) {
    let lessonsDone = 0, known = 0;
    for (let l = 0; l < LESSONS_PER_MODULE; l++) {
        if (progress.completedLessons[moduleIdx + "-" + l]) lessonsDone++;
        for (let i = 0; i < WORDS_PER_LESSON; i++) {
            if (progress.knownWords[moduleIdx + "-" + l + "-" + i]) known++;
        }
    }
    return { lessonsDone, known, totalWords: LESSONS_PER_MODULE * WORDS_PER_LESSON };
}

function ModuleCard({ moduleIdx, progress, setView }) {
    const { lessonsDone, known, totalWords } = moduleStats(moduleIdx, progress);
    const pct = Math.round((lessonsDone / LESSONS_PER_MODULE) * 100);
    const done = lessonsDone === LESSONS_PER_MODULE;
    return (
        <button onClick={() => setView({ screen: "lessons", moduleIdx })}
            className="text-left bg-white dark:bg-slate-900 rounded-2xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md hover:-translate-y-0.5 active:scale-[.99] transition group">
            <div className="flex items-start justify-between">
                <div className="w-11 h-11 rounded-xl bg-gradient-to-br from-red-500 to-rose-600 text-white grid place-items-center font-bold shadow">{moduleIdx + 1}</div>
                {done
                    ? <span className="text-emerald-500"><Icon name="CircleCheckBig" className="w-6 h-6" /></span>
                    : <span className="text-xs font-semibold text-slate-400">{pct}%</span>}
            </div>
            <h3 className="font-bold mt-3 group-hover:text-red-500 transition">Módulo {moduleIdx + 1}</h3>
            <p className="text-sm text-slate-500 dark:text-slate-400">{MODULE_THEMES[moduleIdx]}</p>
            <div className="mt-3 h-2 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                <div className="h-full bg-red-500 rounded-full transition-all" style={{ width: pct + "%" }} />
            </div>
            <div className="flex justify-between text-xs text-slate-400 mt-2">
                <span>{lessonsDone}/{LESSONS_PER_MODULE} aulas</span>
                <span>{known}/{totalWords} palavras</span>
            </div>
        </button>
    );
}

/* ------------------------------------------------------------------ */
/*  Flashcards                                                         */
/* ------------------------------------------------------------------ */
function Flashcards({ mode, moduleIdx, lessonIdx, progress, update, registerStudy, setView }) {
    const today = todayStr();
    const isReview = mode === "review";
    // snapshot dos cards no início da sessão (não muda no meio)
    const [cards] = useState(() => buildSessionCards(isReview ? "review" : "lesson", moduleIdx, lessonIdx, progress, today));
    const [queue, setQueue] = useState(() => cards.map((_, i) => i)); // posições dentro de `cards`
    const [pos, setPos] = useState(0);
    const [flipped, setFlipped] = useState(false);
    const [showFuri, setShowFuri] = useState(progress.showFurigana);
    const [reviewed, setReviewed] = useState(0);
    const [again, setAgain] = useState(0);
    const [finished, setFinished] = useState(false);

    const total = cards.length;
    const cardIdx = queue[pos];
    const card = total ? cards[cardIdx] : null;
    const barPct = total ? Math.round(((total - queue.length) / total) * 100) : 100;
    const goBack = () => isReview ? setView({ screen: "dashboard" }) : setView({ screen: "lessons", moduleIdx });

    useEffect(() => { if (total > 0) registerStudy(); }, []);

    const handleGrade = (grade) => {
        const key = card.key;
        update(prev => {
            const prevSrs = prev.srs || {};
            return {
                ...prev,
                srs: { ...prevSrs, [key]: scheduleReview(prevSrs[key], grade, today) },
                knownWords: { ...prev.knownWords, [key]: grade !== 0 },
            };
        });
        setFlipped(false);
        if (grade === 0) {
            // Esqueceu: volta para o fim da fila e reaparece ainda nesta sessão.
            setAgain(n => n + 1);
            const nq = queue.filter((_, i) => i !== pos);
            nq.push(cardIdx);
            setQueue(nq);
            setPos(p => (p >= nq.length ? 0 : p));
        } else {
            setReviewed(n => n + 1);
            const nq = queue.filter((_, i) => i !== pos);
            if (nq.length === 0) {
                if (!isReview) {
                    update(prev => ({ ...prev, completedLessons: { ...prev.completedLessons, [moduleIdx + "-" + lessonIdx]: true } }));
                }
                setFinished(true);
                return;
            }
            setQueue(nq);
            setPos(p => (p >= nq.length ? 0 : p));
        }
    };

    // Atalhos de teclado: Espaço/Enter vira o card; 1–4 avaliam.
    useEffect(() => {
        const onKey = (e) => {
            if (finished || !card) return;
            if (!flipped) {
                if (e.key === " " || e.key === "Enter") { e.preventDefault(); setFlipped(true); }
                return;
            }
            const map = { "1": 0, "2": 1, "3": 2, "4": 3 };
            if (e.key in map) { e.preventDefault(); handleGrade(map[e.key]); }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
    }, [flipped, finished, queue, pos]);

    // Estado vazio (modo revisão sem nada vencido).
    if (total === 0) {
        return (
            <div className="animate-slideup max-w-md mx-auto text-center pt-10">
                <div className="text-7xl mb-4">✅</div>
                <h2 className="text-2xl font-extrabold">Tudo em dia!</h2>
                <p className="text-slate-500 dark:text-slate-400 mt-2">Nenhuma palavra para revisar agora. Volte mais tarde ou aprenda palavras novas.</p>
                <div className="flex flex-col gap-3 mt-6">
                    <button onClick={() => setView({ screen: "modules" })}
                        className="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-2xl active:scale-95 transition flex items-center justify-center gap-2">
                        <Icon name="GraduationCap" className="w-5 h-5" /> Aprender palavras novas
                    </button>
                    <button onClick={() => setView({ screen: "dashboard" })} className="text-slate-500 font-semibold py-2">Voltar ao início</button>
                </div>
            </div>
        );
    }

    if (finished) {
        return (
            <div className="animate-slideup max-w-md mx-auto text-center pt-8">
                <div className="text-7xl mb-4">🎉</div>
                <h2 className="text-2xl font-extrabold">{isReview ? "Revisão concluída!" : "Aula concluída!"}</h2>
                {!isReview && <p className="text-slate-500 dark:text-slate-400 mt-1">Módulo {moduleIdx + 1} · Aula {lessonIdx + 1}</p>}
                <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 border border-slate-200 dark:border-slate-800 mt-6 shadow-sm">
                    <div className="text-5xl font-extrabold text-emerald-500">{reviewed}</div>
                    <p className="text-sm text-slate-500 mt-1">{reviewed === 1 ? "palavra revisada" : "palavras revisadas"}</p>
                    {again > 0 && <p className="text-xs text-amber-500 mt-2">{again} {again === 1 ? "repetição" : "repetições"} ("De novo")</p>}
                </div>
                <p className="text-xs text-slate-400 mt-4">As palavras voltam para revisão automaticamente na data agendada.</p>
                <div className="flex flex-col gap-3 mt-6">
                    {!isReview && (
                        <button onClick={() => setView({ screen: "quiz", moduleIdx, lessonIdx })}
                            className="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-2xl active:scale-95 transition flex items-center justify-center gap-2">
                            <Icon name="ListChecks" className="w-5 h-5" /> Testar o que aprendi
                        </button>
                    )}
                    {!isReview && lessonIdx < LESSONS_PER_MODULE - 1 && (
                        <button onClick={() => setView({ screen: "flashcards", mode: "lesson", moduleIdx, lessonIdx: lessonIdx + 1 })}
                            className="bg-slate-100 dark:bg-slate-800 font-semibold py-3 rounded-2xl active:scale-95 transition flex items-center justify-center gap-2">
                            Próxima aula <Icon name="ArrowRight" className="w-5 h-5" />
                        </button>
                    )}
                    <button onClick={() => setView({ screen: "dashboard" })}
                        className="bg-slate-100 dark:bg-slate-800 font-semibold py-3 rounded-2xl active:scale-95 transition flex items-center justify-center gap-2">
                        <Icon name="House" className="w-4 h-4" /> Início
                    </button>
                    {!isReview && <button onClick={() => setView({ screen: "lessons", moduleIdx })} className="text-slate-500 font-semibold py-2">Voltar às aulas</button>}
                </div>
            </div>
        );
    }

    const word = card.word;
    const srsItem = (progress.srs || {})[card.key];
    const grades = [
        { g: 0, label: "De novo", icon: "RotateCcw",   cls: "border-rose-300 dark:border-rose-500/40 text-rose-600 dark:text-rose-400" },
        { g: 1, label: "Difícil", icon: "TrendingDown", cls: "border-amber-300 dark:border-amber-500/40 text-amber-600 dark:text-amber-400" },
        { g: 2, label: "Bom",     icon: "Check",        cls: "border-emerald-300 dark:border-emerald-500/40 text-emerald-600 dark:text-emerald-400" },
        { g: 3, label: "Fácil",   icon: "Sparkles",     cls: "border-sky-300 dark:border-sky-500/40 text-sky-600 dark:text-sky-400" },
    ];

    return (
        <div className="animate-slideup max-w-xl mx-auto">
            {/* Topo */}
            <div className="flex items-center gap-3 mb-4">
                <button onClick={goBack} className="w-9 h-9 rounded-full grid place-items-center hover:bg-slate-100 dark:hover:bg-slate-800 transition shrink-0" aria-label="Fechar">
                    <Icon name="X" className="w-5 h-5" />
                </button>
                <div className="flex-1 h-2.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-red-500 to-rose-500 rounded-full transition-all duration-300" style={{ width: barPct + "%" }} />
                </div>
                <span className="text-sm font-semibold text-slate-500 tabular-nums shrink-0">{queue.length} restam</span>
            </div>
            <div className="text-center text-xs text-slate-400 mb-3">
                {isReview && <span className="inline-flex items-center gap-1 text-indigo-500 font-semibold"><Icon name="RefreshCw" className="w-3.5 h-3.5" /> Revisão · </span>}
                Módulo {card.m + 1} · Aula {card.l + 1}
            </div>

            {/* Card */}
            <div key={card.key + "-" + queue.length} className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-lg p-6 sm:p-8 animate-flip">
                {word.mock && (
                    <div className="text-[10px] uppercase tracking-widest text-amber-500 bg-amber-50 dark:bg-amber-500/10 rounded-full px-2 py-0.5 inline-block mb-3">demo / mock</div>
                )}
                <div className="flex flex-col items-center text-center min-h-[180px] justify-center">
                    <Ruby jp={word.jp} furigana={word.furigana} show={showFuri} />
                    <div className="mt-3 flex items-center gap-3">
                        <button onClick={() => setShowFuri(s => !s)}
                            className="text-sm font-semibold text-red-500 inline-flex items-center gap-1 hover:underline">
                            <Icon name={showFuri ? "EyeOff" : "Eye"} className="w-4 h-4" />
                            {showFuri ? "Ocultar furigana" : "Mostrar furigana"}
                        </button>
                        <button onClick={() => speak(word.jp)} className="w-9 h-9 rounded-full bg-red-50 dark:bg-red-500/10 text-red-500 grid place-items-center active:scale-90 transition" aria-label="Ouvir palavra">
                            <Icon name="Volume2" className="w-5 h-5" />
                        </button>
                    </div>
                    {!showFuri && <div className="text-xs text-slate-400 mt-1 font-jp">leitura: {word.romaji}</div>}
                </div>

                {/* Verso (após revelar) */}
                {flipped && (
                    <div className="mt-6 animate-pop space-y-4">
                        <div className="text-center">
                            <div className="text-xs uppercase tracking-widest text-slate-400">Significado</div>
                            <div className="text-2xl font-extrabold mt-1">{word.meaning}</div>
                        </div>
                        {word.ex && (
                            <div className="bg-slate-50 dark:bg-slate-800/60 rounded-2xl p-4">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-xs uppercase tracking-widest text-slate-400">Exemplo</span>
                                    <button onClick={() => speak(word.ex)} className="text-red-500 inline-flex items-center gap-1 text-xs font-semibold active:scale-90 transition">
                                        <Icon name="Volume2" className="w-4 h-4" /> Ouvir frase
                                    </button>
                                </div>
                                <p className="font-jp text-lg text-slate-900 dark:text-white leading-loose">
                                    <ExampleJP word={word} showFuri={showFuri} />
                                </p>
                                {word.exTr && <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">{word.exTr}</p>}
                            </div>
                        )}
                    </div>
                )}
            </div>

            {/* Ação: revelar ou avaliar (repetição espaçada) */}
            {!flipped ? (
                <button onClick={() => setFlipped(true)}
                    className="mt-5 w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3.5 rounded-2xl active:scale-95 transition flex items-center justify-center gap-2">
                    <Icon name="Eye" className="w-5 h-5" /> Mostrar significado
                </button>
            ) : (
                <>
                    <div className="grid grid-cols-4 gap-2 mt-5">
                        {grades.map(({ g, label, icon, cls }) => (
                            <button key={g} onClick={() => handleGrade(g)}
                                className={"bg-white dark:bg-slate-900 border-2 rounded-2xl py-3 px-1 active:scale-95 transition flex flex-col items-center gap-1 " + cls}>
                                <Icon name={icon} className="w-5 h-5" />
                                <span className="font-bold text-sm leading-none">{label}</span>
                                <span className="text-[11px] opacity-70 tabular-nums">{humanizeInterval(scheduleReview(srsItem, g, today).interval)}</span>
                            </button>
                        ))}
                    </div>
                    <p className="text-center text-xs text-slate-400 mt-3">Avalie o quanto lembrou — o tempo até a próxima revisão se ajusta sozinho. <span className="hidden sm:inline">(teclas 1–4)</span></p>
                </>
            )}
        </div>
    );
}

/* ------------------------------------------------------------------ */
/*  QUIZ — mini-testes estilo Duolingo (reforço da aula)               */
/*  Gera ~10 perguntas a partir das 20 palavras da aula, misturando    */
/*  5 tipos de exercício. Acerto/erro alimentam a repetição espaçada:  */
/*  errou -> a palavra volta para "Revisar" hoje; acertou -> avança.   */
/* ------------------------------------------------------------------ */
function shuffledArr(arr) {
    const a = arr.slice();
    for (let k = a.length - 1; k > 0; k--) {
        const j = Math.floor(Math.random() * (k + 1));
        const t = a[k]; a[k] = a[j]; a[j] = t;
    }
    return a;
}

// Escolhe até n índices "distratores" cujo `field` é diferente do alvo (sem repetir).
function pickDistractors(words, targetIdx, field, n) {
    const seen = {}; seen[words[targetIdx][field]] = true;
    const out = [];
    for (const i of shuffledArr(words.map((_, idx) => idx))) {
        if (i === targetIdx) continue;
        const v = words[i][field];
        if (seen[v]) continue;
        seen[v] = true;
        out.push(i);
        if (out.length === n) break;
    }
    return out;
}

const QUIZ_PROMPTS = {
    jp2pt: "O que significa?",
    pt2jp: "Escolha a palavra certa:",
    reading: "Como se lê?",
    cloze: "Complete a frase:",
    listen: "O que você ouviu?",
};

// Monta uma pergunta para a palavra de índice `ti` dentro de `words`.
function makeQuestion(ti, words, moduleIdx, lessonIdx, ttsOk) {
    const word = words[ti];
    const types = ["jp2pt", "pt2jp"];
    if (word.jp !== word.furigana) types.push("reading");               // leitura (kanji -> kana)
    if (word.ex && word.ex.indexOf(word.jp) !== -1) types.push("cloze"); // completar a frase
    if (ttsOk) types.push("listen");                                    // escuta
    const type = types[Math.floor(Math.random() * types.length)];
    const field = type === "jp2pt" ? "meaning" : type === "reading" ? "furigana" : "jp";
    const dist = pickDistractors(words, ti, field, 3);
    const options = shuffledArr([ti].concat(dist)).map(i => ({ word: words[i], correct: i === ti }));
    return { type, key: moduleIdx + "-" + lessonIdx + "-" + ti, word, options };
}

function buildQuiz(moduleIdx, lessonIdx, count) {
    const words = getLessonWords(moduleIdx, lessonIdx).filter(Boolean);
    if (words.length < 4) return [];   // precisa de 4 p/ montar alternativas
    const ttsOk = "speechSynthesis" in window;
    const targets = shuffledArr(words.map((_, i) => i)).slice(0, Math.min(count || 10, words.length));
    return targets.map((ti, n) => {
        const q = makeQuestion(ti, words, moduleIdx, lessonIdx, ttsOk);
        q.id = n;
        return q;
    });
}

// Palavra japonesa com furigana (para enunciados e opções).
function QuizWord({ word, big }) {
    const showRuby = word.jp !== word.furigana;
    const size = big ? "text-4xl sm:text-5xl" : "text-xl";
    return (
        <span className={"font-jp font-bold leading-tight " + size}>
            {showRuby ? <ruby>{word.jp}<rt>{word.furigana}</rt></ruby> : word.jp}
        </span>
    );
}

function Quiz({ moduleIdx, lessonIdx, progress, update, registerStudy, setView }) {
    const today = todayStr();
    const [questions] = useState(() => buildQuiz(moduleIdx, lessonIdx, 10));
    const [queue, setQueue] = useState(() => questions.map(q => q.id));  // fila de ids
    const [chosen, setChosen] = useState(null);                         // índice da opção escolhida
    const [firstSeen, setFirstSeen] = useState({});                     // id -> já tentada? (p/ pontuação)
    const [score, setScore] = useState(0);                             // acertos de primeira
    const [finished, setFinished] = useState(false);

    const total = questions.length;
    const current = queue.length ? queue[0] : -1;
    const q = current >= 0 ? questions[current] : null;
    const answered = chosen !== null;
    const isCorrect = answered && q && q.options[chosen].correct;

    useEffect(() => { if (total > 0) registerStudy(); }, []);

    // Toca o áudio automaticamente nas perguntas de escuta.
    useEffect(() => {
        if (!finished && q && q.type === "listen" && chosen === null) speak(q.word.jp);
    }, [current]);

    const answer = (optIdx) => {
        if (chosen !== null || !q) return;
        const correct = q.options[optIdx].correct;
        setChosen(optIdx);
        if (firstSeen[q.id]) return;   // repetições (palavra reenfileirada) não regravam o SRS
        setFirstSeen(s => { const n = { ...s }; n[q.id] = true; return n; });
        if (correct) setScore(s => s + 1);
        // Reforço na repetição espaçada (vale a 1ª tentativa): acertou = "Bom";
        // errou = "De novo" -> a palavra fica vencida hoje e reaparece em "Revisar".
        const key = q.key;
        update(prev => {
            const prevSrs = prev.srs || {};
            const nextSrs = { ...prevSrs };
            nextSrs[key] = scheduleReview(prevSrs[key], correct ? 2 : 0, today);
            return {
                ...prev,
                srs: nextSrs,
                knownWords: correct ? { ...prev.knownWords, [key]: true } : prev.knownWords,
            };
        });
    };

    const next = () => {
        if (!q) return;
        const correct = q.options[chosen].correct;
        const rest = queue.slice(1);
        const nq = correct ? rest : rest.concat([q.id]);   // errou -> reaparece no fim
        setChosen(null);
        if (nq.length === 0) setFinished(true);
        else setQueue(nq);
    };

    // Atalhos: 1–4 respondem; Enter/Espaço continua.
    useEffect(() => {
        const onKey = (e) => {
            if (finished || !q) return;
            if (chosen === null) {
                const num = parseInt(e.key, 10);
                if (num >= 1 && num <= q.options.length) { e.preventDefault(); answer(num - 1); }
            } else if (e.key === "Enter" || e.key === " ") {
                e.preventDefault(); next();
            }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
    }, [chosen, finished, queue]);

    // Sem palavras suficientes (dataset desta aula ainda não carregado).
    if (total === 0) {
        return (
            <div className="animate-slideup max-w-md mx-auto text-center pt-12">
                <div className="text-6xl mb-4">📭</div>
                <h2 className="text-xl font-extrabold">Teste indisponível</h2>
                <p className="text-slate-500 dark:text-slate-400 mt-2">As palavras desta aula ainda não foram carregadas. Tente novamente em instantes.</p>
                <button onClick={() => setView({ screen: "lessons", moduleIdx })}
                    className="mt-6 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-2xl active:scale-95 transition">Voltar às aulas</button>
            </div>
        );
    }

    if (finished) {
        const pct = Math.round((score / total) * 100);
        let emoji = "🎉", msg = "Excelente! Você mandou bem.";
        if (pct < 50) { emoji = "💪"; msg = "Continue praticando — você vai chegar lá!"; }
        else if (pct < 80) { emoji = "👍"; msg = "Muito bem! Já está pegando o jeito."; }
        const hasNext = lessonIdx < LESSONS_PER_MODULE - 1;
        const missed = total - score;
        return (
            <div className="animate-slideup max-w-md mx-auto text-center pt-8">
                <div className="text-7xl mb-4">{emoji}</div>
                <h2 className="text-2xl font-extrabold">Teste concluído!</h2>
                <p className="text-slate-500 dark:text-slate-400 mt-1">Módulo {moduleIdx + 1} · Aula {lessonIdx + 1}</p>
                <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 border border-slate-200 dark:border-slate-800 mt-6 shadow-sm">
                    <div className="text-5xl font-extrabold text-emerald-500">{score}<span className="text-2xl text-slate-400">/{total}</span></div>
                    <p className="text-sm text-slate-500 mt-1">acertos de primeira ({pct}%)</p>
                    <div className="mt-4 h-3 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                        <div className="h-full bg-emerald-500 rounded-full transition-all duration-500" style={{ width: pct + "%" }} />
                    </div>
                    <p className="text-sm font-semibold mt-3">{msg}</p>
                </div>
                {missed > 0 && (
                    <p className="text-xs text-slate-400 mt-4 flex items-center justify-center gap-1">
                        <Icon name="RefreshCw" className="w-3.5 h-3.5" /> {missed} {missed === 1 ? "palavra que você errou voltou" : "palavras que você errou voltaram"} para a revisão.
                    </p>
                )}
                <div className="flex flex-col gap-3 mt-6">
                    <button onClick={() => setView({ screen: "quiz", moduleIdx, lessonIdx, nonce: Date.now() })}
                        className="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-2xl active:scale-95 transition flex items-center justify-center gap-2">
                        <Icon name="RotateCcw" className="w-5 h-5" /> Refazer teste
                    </button>
                    {hasNext && (
                        <button onClick={() => setView({ screen: "flashcards", mode: "lesson", moduleIdx, lessonIdx: lessonIdx + 1 })}
                            className="bg-slate-100 dark:bg-slate-800 font-semibold py-3 rounded-2xl active:scale-95 transition flex items-center justify-center gap-2">
                            Próxima aula <Icon name="ArrowRight" className="w-5 h-5" />
                        </button>
                    )}
                    <button onClick={() => setView({ screen: "lessons", moduleIdx })} className="text-slate-500 font-semibold py-2">Voltar às aulas</button>
                </div>
            </div>
        );
    }

    const uniqueLeft = new Set(queue).size;
    const barPct = Math.round(((total - uniqueLeft) / total) * 100);
    const correctOpt = q.options.find(o => o.correct).word;
    const correctText = q.type === "jp2pt" ? correctOpt.meaning
        : q.type === "reading" ? correctOpt.furigana
        : correctOpt.jp + (correctOpt.jp !== correctOpt.furigana ? "（" + correctOpt.furigana + "）" : "") + " — " + correctOpt.meaning;

    let clozeBefore = "", clozeAfter = "";
    if (q.type === "cloze") {
        const at = q.word.ex.indexOf(q.word.jp);
        clozeBefore = q.word.ex.slice(0, at);
        clozeAfter = q.word.ex.slice(at + q.word.jp.length);
    }

    const renderOption = (opt) => {
        if (q.type === "jp2pt") return <span className="font-semibold">{opt.word.meaning}</span>;
        if (q.type === "reading") return <span className="font-jp text-xl font-bold">{opt.word.furigana}</span>;
        return <QuizWord word={opt.word} />;
    };

    return (
        <div className="animate-slideup max-w-xl mx-auto">
            {/* Topo: fechar + barra de progresso + restantes */}
            <div className="flex items-center gap-3 mb-4">
                <button onClick={() => setView({ screen: "lessons", moduleIdx })} className="w-9 h-9 rounded-full grid place-items-center hover:bg-slate-100 dark:hover:bg-slate-800 transition shrink-0" aria-label="Fechar">
                    <Icon name="X" className="w-5 h-5" />
                </button>
                <div className="flex-1 h-2.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-red-500 to-rose-500 rounded-full transition-all duration-300" style={{ width: barPct + "%" }} />
                </div>
                <span className="text-sm font-semibold text-slate-500 tabular-nums shrink-0">{uniqueLeft}</span>
            </div>
            <div className="text-center text-xs text-slate-400 mb-3">
                <span className="inline-flex items-center gap-1 text-red-500 font-semibold"><Icon name="ListChecks" className="w-3.5 h-3.5" /> Teste</span> · Módulo {moduleIdx + 1} · Aula {lessonIdx + 1}
            </div>

            {/* Enunciado */}
            <div className="text-center font-bold text-lg mb-3">{QUIZ_PROMPTS[q.type]}</div>
            <div className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-lg p-6 sm:p-8 min-h-[150px] flex flex-col items-center justify-center text-center gap-3">
                {q.type === "jp2pt" && (
                    <>
                        <QuizWord word={q.word} big />
                        <button onClick={() => speak(q.word.jp)} className="w-9 h-9 rounded-full bg-red-50 dark:bg-red-500/10 text-red-500 grid place-items-center active:scale-90 transition" aria-label="Ouvir">
                            <Icon name="Volume2" className="w-5 h-5" />
                        </button>
                    </>
                )}
                {q.type === "pt2jp" && <div className="text-3xl font-extrabold">{q.word.meaning}</div>}
                {q.type === "reading" && <div className="font-jp text-6xl font-bold text-slate-900 dark:text-white">{q.word.jp}</div>}
                {q.type === "listen" && (
                    <>
                        <button onClick={() => speak(q.word.jp)} className="w-24 h-24 rounded-full bg-gradient-to-br from-red-500 to-rose-600 text-white grid place-items-center shadow-lg active:scale-95 transition" aria-label="Ouvir de novo">
                            <Icon name="Volume2" className="w-10 h-10" />
                        </button>
                        <div className="text-xs text-slate-400">toque para ouvir de novo</div>
                    </>
                )}
                {q.type === "cloze" && (
                    <>
                        <p className="font-jp text-2xl sm:text-3xl leading-relaxed text-slate-900 dark:text-white">
                            {clozeBefore}<span className="inline-block align-middle mx-1 w-12 border-b-[3px] border-red-400" />{clozeAfter}
                        </p>
                        {q.word.exTr && <p className="text-sm text-slate-500 dark:text-slate-400">{q.word.exTr}</p>}
                    </>
                )}
            </div>

            {/* Opções */}
            <div className="grid gap-2.5 mt-5">
                {q.options.map((opt, i) => {
                    let cls = "border-slate-200 dark:border-slate-800 hover:border-red-400 hover:bg-red-50/40 dark:hover:bg-red-500/5";
                    let badge = "bg-slate-100 dark:bg-slate-800 text-slate-500";
                    if (answered) {
                        if (opt.correct) { cls = "border-emerald-400 bg-emerald-50 dark:bg-emerald-500/10"; badge = "bg-emerald-500 text-white"; }
                        else if (i === chosen) { cls = "border-rose-400 bg-rose-50 dark:bg-rose-500/10"; badge = "bg-rose-500 text-white"; }
                        else cls = "border-slate-200 dark:border-slate-800 opacity-50";
                    }
                    return (
                        <button key={i} disabled={answered} onClick={() => answer(i)}
                            className={"relative w-full text-left rounded-2xl border-2 px-4 py-3.5 flex items-center gap-3 transition active:scale-[.99] " + cls}>
                            <span className={"w-7 h-7 shrink-0 rounded-lg grid place-items-center text-sm font-bold " + badge}>{i + 1}</span>
                            <span className="flex-1">{renderOption(opt)}</span>
                            {answered && opt.correct && <Icon name="Check" className="w-5 h-5 text-emerald-500 shrink-0" />}
                            {answered && !opt.correct && i === chosen && <Icon name="X" className="w-5 h-5 text-rose-500 shrink-0" />}
                        </button>
                    );
                })}
            </div>

            {/* Feedback + Continuar */}
            {answered && (
                <div className={"mt-5 rounded-2xl p-4 flex items-center gap-3 animate-slideup " + (isCorrect ? "bg-emerald-50 dark:bg-emerald-500/10" : "bg-rose-50 dark:bg-rose-500/10")}>
                    <div className={"w-10 h-10 rounded-full grid place-items-center shrink-0 " + (isCorrect ? "bg-emerald-500" : "bg-rose-500")}>
                        <Icon name={isCorrect ? "Check" : "X"} className="w-6 h-6 text-white" />
                    </div>
                    <div className="flex-1 min-w-0">
                        <div className={"font-extrabold " + (isCorrect ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400")}>
                            {isCorrect ? "Correto!" : "Resposta certa"}
                        </div>
                        {!isCorrect && <div className={"text-sm text-slate-600 dark:text-slate-300 mt-0.5 " + (q.type === "jp2pt" ? "" : "font-jp")}>{correctText}</div>}
                    </div>
                    <button onClick={next} className={"font-bold px-5 py-2.5 rounded-xl text-white active:scale-95 transition shrink-0 " + (isCorrect ? "bg-emerald-500 hover:bg-emerald-600" : "bg-rose-500 hover:bg-rose-600")}>
                        Continuar
                    </button>
                </div>
            )}
            {!answered && <p className="text-center text-xs text-slate-400 mt-3 hidden sm:block">Toque numa opção ou use as teclas 1–{q.options.length}.</p>}
        </div>
    );
}

function PageTitle({ title, subtitle }) {
    return (
        <div className="mb-5">
            <h1 className="text-2xl font-extrabold tracking-tight">{title}</h1>
            {subtitle && <p className="text-slate-500 dark:text-slate-400 text-sm">{subtitle}</p>}
        </div>
    );
}

function BottomNav({ view, setView, dueCount }) {
    const isReview = view.screen === "flashcards" && view.mode === "review";
    const active = isReview ? "review" : (view.screen === "dashboard" ? "dashboard" : "modules");
    const go = {
        dashboard: () => setView({ screen: "dashboard" }),
        review: () => setView({ screen: "flashcards", mode: "review" }),
        modules: () => setView({ screen: "modules" }),
    };
    const items = [
        { id: "dashboard", icon: "House", label: "Início" },
        { id: "review", icon: "RefreshCw", label: "Revisar", badge: dueCount },
        { id: "modules", icon: "Layers", label: "Módulos" },
    ];
    return (
        <nav className="fixed bottom-0 inset-x-0 z-20 sm:hidden bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800">
            <div className="grid grid-cols-3 max-w-md mx-auto">
                {items.map(it => (
                    <button key={it.id} onClick={go[it.id]}
                        className={"relative flex flex-col items-center gap-0.5 py-3 transition " + (active === it.id ? "text-red-500" : "text-slate-400")}>
                        {it.badge > 0 && (
                            <span className="absolute top-1.5 left-1/2 translate-x-2 min-w-[16px] h-4 px-1 rounded-full bg-indigo-500 text-white text-[10px] font-bold grid place-items-center tabular-nums">{it.badge > 99 ? "99+" : it.badge}</span>
                        )}
                        <Icon name={it.icon} className="w-5 h-5" />
                        <span className="text-[11px] font-semibold">{it.label}</span>
                    </button>
                ))}
            </div>
        </nav>
    );
}
